apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mongo.serviceName }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.mongo.labels.app }}
  ports:
    - protocol: TCP
      port: {{ .Values.mongo.port }}
      targetPort: {{ .Values.mongo.port }}
  clusterIP: None
